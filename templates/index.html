<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Recipe Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fcf5ee;
            font-family: -apple-system, 'Noto Sans KR', 'Helvetica Neue', sans-serif;
            min-height: 100vh; color: #1c1c1e;
            max-width: 402px; margin: 0 auto;
        }
        .status-bar { padding: 0.8rem 1.4rem 0.4rem; font-size: 0.8rem; font-weight: 600; }

        .week-strip {
            margin: 0.5rem 0.8rem; padding: 0.6rem 0.5rem;
            background: #d9be9b; border-radius: 16px;
            display: flex; justify-content: space-between;
        }
        .week-day { text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .week-day .dow { font-size: 0.58rem; color: #6a4a2a; font-weight: 500; }
        .week-day .num {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 600; color: #5a3a20;
        }
        .week-day.today .num { background: #fff; color: #b87333; font-weight: 700; }
        .week-day.done .num {
            width: auto; height: auto; min-width: 28px; min-height: 28px;
            border-radius: 14px; background: #c6e2d5; color: #2d4a3a;
            font-size: 0.52rem; padding: 2px 5px; max-width: 52px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .week-day.done .dow { display: none; }

        .section { margin: 0.4rem 0.8rem; border-radius: 18px; padding: 1rem 0.9rem; }
        .step-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 0.3rem; }
        .step-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.8rem; }

        /* PEACH - meat */
        .card-meat { }
        .card-meat .step-label { color: #b87333; }
        .card-meat .step-title { color: #4a2a10; }

        /* GREEN - spice */
        .card-spice { }
        .card-spice .step-label { color: #5a7a3a; }
        .card-spice .step-title { color: #2d4a1a; }

        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        .ingredient-chip {
            border-radius: 16px; padding: 0.7rem 0.3rem;
            text-align: center; cursor: pointer; border: 2px solid transparent;
            transition: all 0.2s; font-family: inherit;
        }
        .ingredient-chip:hover { border-color: #c09070; }
        .ingredient-chip.selected {
            border-color: #b87333; box-shadow: 0 0 0 3px rgba(184,115,51,0.12);
        }
        .card-spice .ingredient-chip.selected { border-color: #4a8a6a; }
        .card-spice .ingredient-chip:hover { border-color: #8ab89a; }
        .chip-thumb {
            width: 72px; height: 72px; border-radius: 14px;
            overflow: hidden; margin: 0 auto 0.4rem; background: #fcf5ee;
        }
        .chip-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .chip-label { font-size: 0.8rem; font-weight: 600; }
        .card-meat .chip-label { color: #4a2a10; }
        .card-spice .chip-label { color: #2d4a1a; }

        .cta-red {
            background: #fe6652; margin: 1rem 0.8rem 1.5rem;
            border-radius: 18px; padding: 1rem; text-align: center;
            cursor: pointer; transition: all 0.2s;
        }
        .cta-red:hover { background: #f05540; }
        .cta-red .cta-text { color: #fff; font-size: 1rem; font-weight: 700; }
        .cta-red.disabled { background: #d5c0b0; cursor: not-allowed; }
        .cta-red.disabled:hover { background: #d5c0b0; }
    </style>
</head>
<body>

    <div class="status-bar">9:41</div>
    <div class="week-strip" id="week-strip"></div>

    <!-- PEACH: meat selection -->
    <div class="section card-meat">
        <p class="step-label">STEP 1</p>
        <p class="step-title">어떤 고기가 있나요?</p>
        <div class="chip-grid">
            {% for key, meat in meats.items() %}
            <button class="ingredient-chip meat-chip" data-meat="{{ key }}">
                <div class="chip-thumb"><img src="/static/ingredients/{{ key }}.png" alt="{{ meat.name }}" onerror="this.parentElement.innerHTML='{{ meat.emoji }}'"></div>
                <span class="chip-label">{{ meat.name }}</span>
            </button>
            {% endfor %}
        </div>
    </div>

    <!-- GREEN: spice selection -->
    <div class="section card-spice">
        <p class="step-label">STEP 2</p>
        <p class="step-title">향신료는 뭐가 있나요?</p>
        <div class="chip-grid">
            {% for key, spice in spices.items() %}
            <button class="ingredient-chip spice-chip" data-spice="{{ key }}">
                <div class="chip-thumb"><img src="/static/ingredients/{{ key }}.png" alt="{{ spice.name }}" onerror="this.parentElement.innerHTML='{{ spice.emoji }}'"></div>
                <span class="chip-label">{{ spice.name }}</span>
            </button>
            {% endfor %}
        </div>
    </div>

    <!-- RED CTA -->
    <div class="cta-red disabled" id="cta-btn" onclick="goMenu()">
        <span class="cta-text">남은 재료로 세계여행 맛보기</span>
    </div>

    <script>
        const DOW = ['일','월','화','수','목','금','토'];
        const doneMap = JSON.parse(localStorage.getItem('fridge_done') || '{}');
        function renderWeek() {
            const today = new Date(), day = today.getDay();
            const sunday = new Date(today); sunday.setDate(today.getDate() - day);
            const strip = document.getElementById('week-strip'); strip.innerHTML = '';
            for (let i=0;i<7;i++) {
                const d=new Date(sunday); d.setDate(sunday.getDate()+i);
                const y=d.getFullYear(),m=d.getMonth(),dt=d.getDate();
                const key=`${y}-${String(m+1).padStart(2,'0')}-${String(dt).padStart(2,'0')}`;
                const isToday=y===today.getFullYear()&&m===today.getMonth()&&dt===today.getDate();
                const dn=doneMap[key];
                strip.innerHTML+=`<div class="week-day${isToday?' today':''}${dn?' done':''}"><span class="dow">${DOW[i]}</span><span class="num">${dn||dt}</span></div>`;
            }
        }
        renderWeek();

        let selMeat=null, selSpice=null;
        document.querySelectorAll('.meat-chip').forEach(c=>{c.onclick=()=>{document.querySelectorAll('.meat-chip').forEach(x=>x.classList.remove('selected'));c.classList.add('selected');selMeat=c.dataset.meat;updateCTA();};});
        document.querySelectorAll('.spice-chip').forEach(c=>{c.onclick=()=>{document.querySelectorAll('.spice-chip').forEach(x=>x.classList.remove('selected'));c.classList.add('selected');selSpice=c.dataset.spice;updateCTA();};});
        function updateCTA() {
            const cta=document.getElementById('cta-btn');
            cta.classList.toggle('disabled',!(selMeat&&selSpice));
            cta.querySelector('.cta-text').textContent=selMeat&&selSpice?'남은 재료로 세계여행 맛보기':'남은 재료로 세계여행 맛보기';
        }
        function goMenu(){if(selMeat&&selSpice)location.href=`/menu?meat=${selMeat}&spice=${selSpice}`;}
    </script>
</body>
</html>
