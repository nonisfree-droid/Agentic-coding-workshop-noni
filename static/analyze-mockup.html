<!DOCTYPE html><html><body style="margin:0;background:#111;display:flex;justify-content:center">
<img id="ref" src="/static/ui-mockup.png" style="max-height:100vh" onload="analyze()">
<pre id="out" style="position:fixed;top:0;left:0;background:rgba(0,0,0,.85);color:#0f0;font-size:10px;padding:10px;max-width:400px;max-height:100vh;overflow:auto"></pre>
<script>
function analyze() {
  const img = document.getElementById('ref');
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0);
  const w = c.width, h = c.height;
  let out = `Size: ${w}x${h}\n\n=== Horizontal strips ===\n`;

  for (let y = 0; y < h; y += 3) {
    let r=0,g=0,b=0,n=0;
    for (let x = 0; x < w; x += 3) {
      const d = ctx.getImageData(x,y,1,1).data;
      r+=d[0]; g+=d[1]; b+=d[2]; n++;
    }
    r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
    const hex = '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
    const bright = (r+g+b)/3;
    out += `y=${String(y).padStart(4)}  ${hex}  bright=${bright.toFixed(0)}\n`;
  }
  document.getElementById('out').textContent = out;
}
</script>
</body></html>
